name: Bug Report
description: Report a bug in gpdf
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please fill out the information below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
      placeholder: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal code or steps to reproduce the issue.
      placeholder: |
        ```go
        package main

        import "github.com/gpdf-dev/gpdf"

        func main() {
            // ...
        }
        ```
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: input
    id: go-version
    attributes:
      label: Go Version
      description: Output of `go version`
      placeholder: "go1.22.0 darwin/arm64"
    validations:
      required: true

  - type: input
    id: gpdf-version
    attributes:
      label: gpdf Version
      placeholder: "v0.9.2"
    validations:
      required: true

  - type: textarea
    id: pdf-viewer
    attributes:
      label: PDF Viewer (if relevant)
      description: Which PDF viewer showed the issue? (Chrome, Preview, Adobe Reader, etc.)
    validations:
      required: false
